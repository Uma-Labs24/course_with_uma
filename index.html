<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course With Uma</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">


<style>


*{

margin:0;
padding:0;
box-sizing:border-box;

}



body{

height:100vh;

overflow:hidden;

font-family:'Poppins',sans-serif;

}




.hero{


height:100vh;

width:100%;


background:url("images/splash-bg.jpg") center/cover no-repeat;


position:relative;


display:flex;

align-items:center;

justify-content:center;


}





/* Bottom blue fade */

.overlay{


position:absolute;

inset:0;


background:

linear-gradient(

to top,

rgba(0,60,255,0.90) 0%,

rgba(0,80,255,0.55) 35%,

rgba(0,80,255,0.15) 75%,

rgba(0,80,255,0) 100%

);


}




/*.content{


position:relative;

z-index:2;


width:100%;


max-width:900px;


text-align:center;


color:white;


padding:20px;


transform:translateY(25px);


} */

.content{


position:relative;

z-index:2;


width:100%;


max-width:900px;


text-align:center;


color:white;


padding:20px;


/*transform:translateY(-15px);*/


}




.logo{


width:135px;


height:135px;


object-fit:contain;


margin-bottom:-1px;


}





h1{


font-family:'Playfair Display',serif;


font-size:4rem;


font-weight:700;


line-height:1.2;


}





h2{


font-family:'Pacifico',cursive;


font-size:2.2rem;


font-weight:400;


line-height:1.5;


margin-top:10px;


}




p{


font-family:'Poppins',sans-serif;


font-size:1.15rem;


font-weight:400;


line-height:1.8;


margin-top:25px;


}




.btn{


margin-top:35px;


display:inline-block;


padding:16px 55px;


background:white;


color:#0645ff;


text-decoration:none;


border-radius:50px;


font-size:1.2rem;


font-weight:700;


box-shadow:0 10px 25px rgba(0,0,0,.25);


}





.bottom{


margin-top:20px;


font-size:17px;


font-weight:500;


}





@media(max-width:768px){


.logo{

width:95px;

height:95px;

}


h1{

font-size:2.7rem;

}


h2{

font-size:1.5rem;

}


p{

font-size:1rem;

}


}



</style>

</head>

<body>

<section class="hero">

<div class="overlay"></div>

<div class="content">

<img src="images/logo2.jpg" class="logo">

<h1>Course With Uma</h1>

<h2>Learn Today<br>Lead Tomorrow</h2>

<p>
Hello Friends 👋<br>
Welcome Back To Our Website
<br><br>
Explore expert-led courses designed
to upgrade your skills and shape your future.
</p>

<a href="home.html" class="btn">
Get Start
</a>

<div class="bottom">
Your Journey To Success Starts Here
</div>

</div>

</section>

</body>
</html>
